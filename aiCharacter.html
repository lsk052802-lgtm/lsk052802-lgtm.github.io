<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>AI HTML 문자 태그 예제</title>
</head>
<body>

    <h1>HTML 문자 관련 태그 예제</h1>

    <!-- 제목 태그 -->
    <h2>제목 태그 (h1 ~ h6)</h2>
    <h1>h1 제목</h1>
    <h2>h2 제목</h2>
    <h3>h3 제목</h3>

    <!-- 문단 -->
    <h2>문단 태그</h2>
    <p>이것은 문단입니다.</p>

    <!-- 줄바꿈 -->
    <h2>줄바꿈</h2>
    줄바꿈 전<br>
    줄바꿈 후

    <!-- 굵게 -->
    <h2>굵게</h2>
    <b>굵은 글씨 (b)</b><br>
    <strong>중요한 글씨 (strong)</strong>

    <!-- 기울임 -->
    <h2>기울임</h2>
    <i>기울임 (i)</i><br>
    <em>강조 (em)</em>

    <!-- 밑줄 / 취소선 -->
    <h2>밑줄 / 취소선</h2>
    <u>밑줄</u><br>
    <s>취소선</s>

    <!-- 위첨자 / 아래첨자 -->
    <h2>첨자</h2>
    X<sup>2</sup> (위첨자)<br>
    H<sub>2</sub>O (아래첨자)

    <!-- 인용 -->
    <h2>인용</h2>
    <blockquote>이것은 블록 인용입니다.</blockquote>
    <q>짧은 인용</q>

    <!-- 코드 -->
    <h2>코드 표시</h2>
    <code>console.log("Hello");</code>

    <!-- 작은 글씨 -->
    <h2>작은 글씨</h2>
    <small>작은 글씨입니다.</small>

    <!-- 강조 표시 -->
    <h2>하이라이트</h2>
    <mark>강조된 텍스트</mark>

</body>
</html>
